<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Surojit Guha — AI-Native Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: 'var(--color-background)',
              surface: 'var(--color-surface)',
              primary: 'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              accent: 'var(--color-accent)',
              glow: 'var(--color-glow)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
      /* Theme CSS Variables */
      :root {
        --color-background: #0b0b0d;
        --color-surface: #121214;
        --color-primary: #f2f2f2;
        --color-secondary: #a1a1aa;
        --color-accent: #2a2a2e;
        --color-glow: #4ff0b7;
      }
      
      [data-theme="light"] {
        --color-background: #fafafa;
        --color-surface: #ffffff;
        --color-primary: #18181b;
        --color-secondary: #52525b;
        --color-accent: #e4e4e7;
        --color-glow: #059669;
      }
      
      body {
        background-color: var(--color-background);
        color: var(--color-primary);
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Custom Scrollbar - Dark */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-background);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-accent);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-secondary);
      }
      .no-select {
        user-select: none;
      }
      
      /* Theme-aware white opacity overrides for light mode */
      [data-theme="light"] .bg-white\/5 { background-color: rgba(0, 0, 0, 0.05); }
      [data-theme="light"] .bg-white\/10 { background-color: rgba(0, 0, 0, 0.08); }
      [data-theme="light"] .bg-white\/\[0\.01\] { background-color: rgba(0, 0, 0, 0.01); }
      [data-theme="light"] .bg-white\/\[0\.02\] { background-color: rgba(0, 0, 0, 0.02); }
      [data-theme="light"] .bg-white\/\[0\.04\] { background-color: rgba(0, 0, 0, 0.04); }
      [data-theme="light"] .border-white\/5 { border-color: rgba(0, 0, 0, 0.08); }
      [data-theme="light"] .border-white\/10 { border-color: rgba(0, 0, 0, 0.1); }
      [data-theme="light"] .border-white\/20 { border-color: rgba(0, 0, 0, 0.15); }
      [data-theme="light"] .border-white\/30 { border-color: rgba(0, 0, 0, 0.2); }
      [data-theme="light"] .text-white { color: var(--color-primary); }
      [data-theme="light"] .text-white\/10 { color: rgba(0, 0, 0, 0.1); }
      [data-theme="light"] .text-white\/60 { color: rgba(0, 0, 0, 0.6); }
      [data-theme="light"] .text-white\/80 { color: rgba(0, 0, 0, 0.8); }
      [data-theme="light"] .text-white\/90 { color: rgba(0, 0, 0, 0.9); }
      [data-theme="light"] .hover\:text-white:hover { color: var(--color-primary); }
      [data-theme="light"] .hover\:border-white\/20:hover { border-color: rgba(0, 0, 0, 0.15); }
      [data-theme="light"] .hover\:bg-white\/\[0\.04\]:hover { background-color: rgba(0, 0, 0, 0.04); }
      [data-theme="light"] .bg-background\/20 { background-color: rgba(250, 250, 250, 0.85); }
      [data-theme="light"] .backdrop-blur-md { backdrop-filter: blur(12px); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react,react-dom",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.16?external=react,react-dom,three",
    "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
    "three": "https://esm.sh/three@0.161.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@9.99.0?external=react,react-dom,three,@react-three/fiber",
    "wouter": "https://esm.sh/wouter@2.11.0?external=react,react-dom"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
